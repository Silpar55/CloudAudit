# =============================================================
# CloudAudit — ML Service docker-compose.yml
# Runs the ML service container in isolation.
#
# IMPORTANT: This compose does NOT include a db service.
# The database is managed by the backend's docker-compose.yml.
# To run the ML service with a live DB, start the backend
# compose first, or use the future root-level docker-compose.yml
# that joins all three services into one shared network.
#
# Usage (ML service only):
#   docker compose up --build
#   curl http://localhost:5000/health
# =============================================================

services:

  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: cloudaudit_ml
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://alejandrosilva:admin@db:5432/cloudaudit
      FLASK_ENV: production
      MODEL_VERSION: isolation-forest-v1
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s